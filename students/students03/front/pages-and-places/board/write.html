<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPABASE BOARD-WRITE</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="logo">
            <a href="../index.html">Pages & Places</a>
        </div>

        <nav class="main-nav">
            <a href="../index.html" class="active">Home</a>
            <a href="../place.html">Places</a>
            <a href="list.html">Community</a>
            <a href="../myroute.html">My Route</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">Community</h1>
        <p class="page-desc">나의 여행후기를 남겨보세요.</p>

        <div class="card">
            <form id="postForm">
                <div class="form-group">
                    <label for="writer">작성자</label>
                    <input type="text" id="writer" placeholder="작성자 입력">
                </div>
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" placeholder="제목 입력">
                </div>
                <div class="form-group">
                    <label for="content">내용</label>
                    <textarea id="content" placeholder="내용입력"></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit">등록하기</button>
                    <a href="list.html" class="btn gray">취소</a>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer">
        <div class="inner">
            <p>COPYRIGHT &copy; 2026 pages and Places. ALL RIGHT RESEVED.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/write.js"></script>
</body>

</html>
